<!DOCTYPE html>
<html>
<head>

<title>AlphaCopilot</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/copilot.css') }}">

<script defer
src="{{ url_for('static', filename='js/copilot.js') }}"></script>

</head>

<body>

<div class="app">

    <div class="sidebar">

        <h2>🚀 AlphaCopilot</h2>

        <button class="new-chat">
            + New Analysis
        </button>

        <div class="history">

            <h3>Recent Chats</h3>

            <div class="item">Risk Analysis</div>
            <div class="item">CPU Spike</div>
            <div class="item">Packet Loss</div>
            <div class="item">Latency Issue</div>

        </div>

    </div>

    <div class="main">

        <div class="topbar">

            <h1>🤖 AlphaCopilot</h1>

            <span class="status">
                ● Online
            </span>

        </div>

        <div class="chat-area" id="chatArea">

            <div class="bot">

                Hello Engineer 👋

                Upload logs and ask me
                about MPLS network health.

            </div>

        </div>

        <div class="input-box">

            <input
            id="userInput"
            placeholder="Ask AlphaCopilot...">

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

</body>
</html>
