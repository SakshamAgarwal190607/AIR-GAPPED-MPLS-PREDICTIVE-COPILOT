<!DOCTYPE html>
<html>
<head>
    <title>Alpha Copilot</title>
    <link rel="stylesheet"
    href="{{ url_for('static', filename='css/copilot.css') }}">
</head>

<body>

<div class="container">

    <h1>🤖 Alpha Copilot</h1>

    <div class="chat-box" id="chat-box">

        <div class="bot-msg">
            Hello Network Engineer 👋
            <br>
            How can I help you today?
        </div>

    </div>

    <div class="input-area">

        <input
        type="text"
        id="user-input"
        placeholder="Ask about network issue...">

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script src="{{ url_for('static',
filename='js/copilot.js') }}"></script>

</body>
</html>
