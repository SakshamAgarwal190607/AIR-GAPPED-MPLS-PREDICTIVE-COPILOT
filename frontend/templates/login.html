<!DOCTYPE html>
<html>

<head>

<title>AlphaCopilot Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<div class="login-card">

    <h1>🚀 AlphaCopilot</h1>

    <p>
        Secure Network Engineer Access
    </p>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form action="/authenticate" method="POST">

        <input
        type="text"
        name="username"
        placeholder="Username"
        required>

        <input
        type="password"
        name="password"
        placeholder="Password"
        required>

        <button type="submit">

            Login

        </button>

    </form>

</div>

</body>

</html>
