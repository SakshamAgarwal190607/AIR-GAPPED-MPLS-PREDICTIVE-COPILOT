<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AlphaCopilot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/upload.css') }}">
</head>

<body>

    <div class="background"></div>

    <div class="container">

        <div class="logo-section">

            <h1>ALPHA<span>COPILOT</span></h1>

            <p>
                AI Powered Air-Gapped MPLS Predictive Maintenance System
            </p>

        </div>

        <div class="upload-card">

            <div class="icon">
                🤖
            </div>

            <h2>Upload Network Logs</h2>

            <p>
                Upload MPLS / SD-WAN / NOC Logs
            </p>

            <form action="/dashboard" method="POST">

                <input
                    type="file"
                    id="fileInput"
                    accept=".csv,.txt,.log"
                >

                <label for="fileInput" class="upload-btn">
                    Select Log File
                </label>

                <p id="fileName">
                    No file selected
                </p>

                <button type="submit" class="analyze-btn">
                    Analyze Network
                </button>

            </form>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/upload.js') }}"></script>

</body>

</html>
